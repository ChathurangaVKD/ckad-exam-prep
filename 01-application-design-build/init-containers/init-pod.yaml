apiVersion: v1
kind: Pod
metadata:
  name: init-example
  labels:
    pattern: init-container
spec:
  initContainers:
  - name: wait-for-service
    image: busybox:1.28
    command: ['sh', '-c',
      'until nslookup my-service.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local;
       do echo "Waiting for my-service..."; sleep 2; done']
  - name: init-html
    image: busybox:1.28
    command: ['sh', '-c', 'echo "<h1>Hello from Init Container!</h1>" > /work-dir/index.html']
    volumeMounts:
    - name: workdir
      mountPath: /work-dir
  containers:
  - name: nginx
    image: nginx:1.25
    ports:
    - containerPort: 80
    volumeMounts:
    - name: workdir
      mountPath: /usr/share/nginx/html
  volumes:
  - name: workdir
    emptyDir: {}

