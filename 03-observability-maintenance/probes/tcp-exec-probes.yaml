apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
spec:
  containers:
  - name: app
    image: nginx:1.25
    ports:
    - containerPort: 80
    # Readiness probe - removes from service if failing
    readinessProbe:
      tcpSocket:
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
    # Liveness probe - restarts if failing
    livenessProbe:
      exec:
        command:
        - sh
        - -c
        - "nginx -t 2>/dev/null"
      initialDelaySeconds: 15
      periodSeconds: 20

