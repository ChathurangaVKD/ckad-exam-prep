apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  APP_ENV: "production"
  nginx.conf: |
    server {
      listen 80;
      location / {
        proxy_pass http://backend;
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-demo
spec:
  volumes:
  - name: config-vol
    configMap:
      name: app-config
      items:
      - key: nginx.conf
        path: nginx.conf
  containers:
  - name: app
    image: nginx:1.25
    envFrom:
    - configMapRef:
        name: app-config
    volumeMounts:
    - name: config-vol
      mountPath: /etc/nginx/conf.d

