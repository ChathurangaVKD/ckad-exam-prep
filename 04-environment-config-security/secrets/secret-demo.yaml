apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:            # Plain text - auto base64 encoded
  DB_USERNAME: "admin"
  DB_PASSWORD: "s3cur3P@ssw0rd"
  API_KEY: "my-secret-api-key"
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-demo
spec:
  volumes:
  - name: secret-vol
    secret:
      secretName: app-secrets
      defaultMode: 0400
  containers:
  - name: app
    image: nginx:1.25
    envFrom:
    - secretRef:
        name: app-secrets
    volumeMounts:
    - name: secret-vol
      mountPath: /etc/secrets
      readOnly: true

